<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CyberSec</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  
  <style>
    /* Auth Layout (No Header/Footer) */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-color), rgba(0, 210, 255, 0.05));
    }
    
    .auth-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
    }
    
    .auth-card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
    }
    
    .auth-social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-color);
      font-weight: 500;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }
    
    .auth-social-btn:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--text-color);
    }
    
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 25px 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }
    
    .divider:not(:empty)::before { margin-right: .25em; }
    .divider:not(:empty)::after { margin-left: .25em; }
    
    .password-wrapper {
      position: relative;
    }
    
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
    }
    
    /* Absolute top controls */
    .top-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 15px;
    }
    
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="top-controls">
    <button id="theme-toggle" class="icon-btn"><i class="fas fa-sun"></i></button>
    <button id="rtl-toggle" class="icon-btn"><i class="fas fa-language"></i></button>
  </div>

  <div class="auth-container reveal-scale">
    <div class="auth-card">
      <div class="logo-container">
        <h1 class="logo-text m-0">Cyber<span class="text-gradient">Sec</span></h1>
      </div>
      
      <h3 class="text-center mb-4">Welcome Back</h3>
      
      <button class="auth-social-btn">
        <i class="fab fa-google text-danger"></i> Continue with Google
      </button>
      
      <button class="auth-social-btn">
        <i class="fab fa-apple"></i> Continue with Apple
      </button>
      
      <div class="divider">or</div>
      
      <form>
        <div class="mb-3">
          <label class="form-label text-muted small">Email Address</label>
          <input type="email" class="cyber-input" required>
        </div>
        
        <div class="mb-4">
          <div class="d-flex justify-content-between">
            <label class="form-label text-muted small">Password</label>
            <a href="#" class="small text-primary text-decoration-none">Forgot?</a>
          </div>
          <div class="password-wrapper">
            <input type="password" id="password-input" class="cyber-input" required>
            <button type="button" class="password-toggle" onclick="togglePassword()">
              <i class="fas fa-eye" id="toggle-icon"></i>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn-cyber btn-cyber-primary w-100">Sign In</button>
      </form>
      
      <p class="text-center mt-4 text-muted small">Don't have an account? <a href="register.html" class="text-primary text-decoration-none">Sign up</a></p>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    function togglePassword() {
      const input = document.getElementById('password-input');
      const icon = document.getElementById('toggle-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>
</body>
</html>

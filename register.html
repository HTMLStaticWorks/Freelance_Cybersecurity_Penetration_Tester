<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | CyberSec</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, rgba(0, 210, 255, 0.05), var(--bg-color));
      padding: 40px 0;
    }
    
    .auth-container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }
    
    .auth-card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    
    .top-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 15px;
    }
    
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="top-controls">
    <button id="theme-toggle" class="icon-btn"><i class="fas fa-sun"></i></button>
    <button id="rtl-toggle" class="icon-btn"><i class="fas fa-arrow-right-arrow-left"></i></button>
  </div>

  <div class="auth-container reveal-scale">
    <div class="auth-card">
      <div class="logo-container">
        <h1 class="logo-text m-0">Cyber<span class="text-gradient">Sec</span></h1>
      </div>
      
      <h3 class="text-center mb-1">Create Account</h3>
      <p class="text-center text-muted small mb-4">Join the secure client portal.</p>
      
      <form>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label text-muted small">First Name</label>
            <input type="text" class="cyber-input" required>
          </div>
          <div class="col-md-6">
            <label class="form-label text-muted small">Last Name</label>
            <input type="text" class="cyber-input" required>
          </div>
          <div class="col-12">
            <label class="form-label text-muted small">Email Address</label>
            <input type="email" class="cyber-input" required>
          </div>
          <div class="col-12">
            <label class="form-label text-muted small">Company</label>
            <input type="text" class="cyber-input">
          </div>
          <div class="col-12">
            <label class="form-label text-muted small">Password</label>
            <input type="password" class="cyber-input" required>
            <div class="form-text text-muted" style="font-size:0.75rem;">Must be at least 12 characters.</div>
          </div>
          
          <div class="col-12 mt-4">
            <button type="submit" class="btn-cyber btn-cyber-primary w-100">Register</button>
          </div>
        </div>
      </form>
      
      <p class="text-center mt-4 text-muted small">Already have an account? <a href="login.html" class="text-primary text-decoration-none">Sign in</a></p>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
